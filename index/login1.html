<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAXI MUNCH - Auth</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Baloo+2&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a8b, #ff6a88, #ff99ac);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Subtle pattern overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/food.png');
      opacity: 0.07;
      z-index: 0;
    }

    .auth-box {
      background: #fff;
      padding: 50px 35px;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      z-index: 1;
      animation: popIn 0.6s ease;
    }

    @keyframes popIn {
      from {
        transform: scale(0.9);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .auth-box h1 {
      font-family: 'Baloo 2', cursive;
      font-size: 32px;
      color: #ff6a88;
      margin-bottom: 10px;
    }

    .auth-box h2 {
      margin-bottom: 25px;
      font-weight: 600;
      color: #444;
    }

    .auth-box input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 2px solid #f0f0f0;
      border-radius: 50px;
      font-size: 15px;
      transition: 0.3s;
    }

    .auth-box input:focus {
      border-color: #ff6a88;
      outline: none;
      box-shadow: 0 0 8px rgba(255, 106, 136, 0.4);
    }

    .auth-box button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6a88, #ff9a8b);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s;
    }

    .auth-box button:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #e45770, #ff6a88);
      box-shadow: 0 6px 15px rgba(255, 106, 136, 0.4);
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .links a {
      color: #ff6a88;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: #e45770;
      text-decoration: underline;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="auth-box">
    <h1>🍔 MAXI MUNCH</h1>

    <!-- Login -->
    <form id="loginForm" class="form active">
      <h2>Welcome Back</h2>
      <input type="text" placeholder="Email Address" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <div class="links">
        <a href="#" onclick="switchForm('registerForm')">Create Account</a> | 
        <a href="#" onclick="switchForm('forgotForm')">Forgot Password?</a>
      </div>
    </form>

    <!-- Register -->
    <form id="registerForm" class="form">
      <h2>Join the Feast</h2>
      <input type="text" placeholder="Username" required />
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <input type="password" placeholder="Confirm Password" required />
      <button type="submit">Register</button>
      <div class="links">
        <a href="#" onclick="switchForm('loginForm')">Already have an account?</a>
      </div>
    </form>

    <!-- Forgot Password -->
    <form id="forgotForm" class="form">
      <h2>Reset Password</h2>
      <input type="email" placeholder="Enter your email" required />
      <button type="submit">Send Reset Link</button>
      <div class="links">
        <a href="#" onclick="switchForm('loginForm')">Back to Login</a>
      </div>
    </form>
  </div>

  <script>
    function switchForm(id) {
      document.querySelectorAll(".form").forEach(f => f.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }
  </script>
</body>

</html>
